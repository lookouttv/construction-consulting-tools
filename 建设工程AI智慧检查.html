<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设工程AI智慧检查</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #60a5fa;
      --success-color: #10b981;
      --error-color: #ef4444;
      --bg-gradient-start: #f0f9ff;
      --bg-gradient-end: #e0f2fe;
      --card-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.2);
      --border-radius: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      color: #1e293b;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .header-icon svg {
      width: 44px;
      height: 44px;
      fill: white;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: #64748b;
    }

    .card {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--card-shadow);
      padding: 40px 30px;
      margin-bottom: 24px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .upload-section {
      animation-delay: 0.1s;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, var(--primary-color), var(--primary-light));
      border-radius: 2px;
    }

    .upload-area {
      position: relative;
    }

    .upload-box {
      width: 100%;
      height: 320px;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .upload-box:hover {
      border-color: var(--primary-color);
      background: #f0f9ff;
    }

    .upload-box.has-image {
      border: none;
      background: #1e293b;
    }

    .upload-box.has-image:hover {
      transform: scale(1.01);
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .upload-box.has-image .preview-image {
      display: block;
    }

    .upload-placeholder {
      text-align: center;
      color: #64748b;
      padding: 20px;
    }

    .upload-box.has-image .upload-placeholder {
      display: none;
    }

    .upload-icon-wrapper {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      transition: transform 0.3s ease;
    }

    .upload-box:hover .upload-icon-wrapper {
      transform: scale(1.1);
    }

    .upload-icon-wrapper svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .upload-placeholder p {
      font-size: 15px;
      font-weight: 500;
    }

    .upload-hint {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .upload-tips {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .upload-tip {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .upload-tip svg {
      width: 14px;
      height: 14px;
      fill: #94a3b8;
    }

    .btn-group {
      margin-top: 30px;
    }

    .analysis-btn {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .analysis-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
    }

    .analysis-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .analysis-btn:disabled {
      background: linear-gradient(135deg, #94a3b8, #64748b);
      cursor: not-allowed;
      box-shadow: none;
    }

    .analysis-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .loading-btn {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .error-msg {
      color: var(--error-color);
      text-align: center;
      padding: 16px;
      background: #fef2f2;
      margin-top: 20px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .loading-section {
      display: none;
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .loading-subtext {
      font-size: 13px;
      color: #94a3b8;
    }

    .report-section {
      display: none;
      animation: fadeInUp 0.5s ease;
    }

    .report-card {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .report-header {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      padding: 24px 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .report-header svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .report-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: white;
      flex: 1;
    }

    .export-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .export-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .export-btn svg {
      width: 18px;
      height: 18px;
    }

    .report-body {
      padding: 30px;
    }

    .report-content {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #334155;
      font-size: 15px;
    }

    .report-content::before {
      content: '📋';
      font-size: 20px;
      display: block;
      margin-bottom: 16px;
    }

    #fileInput {
      display: none;
    }

    .preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .preview-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2rpx 8rpx rgba(0,0,0,0.1);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .photo-num {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(59, 130, 246, 0.9);
      color: white;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
    }

    .success-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: var(--success-color);
      border-radius: 50%;
      margin-right: 8px;
      position: relative;
    }

    .success-icon::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 3px;
      width: 6px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px 40px;
      }

      .card {
        padding: 24px 20px;
      }

      .upload-box {
        height: 260px;
      }

      .header h1 {
        font-size: 24px;
      }

      .upload-tips {
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
      </div>
      <h1>建设工程AI智慧检查</h1>
      <p>武汉市政院工程建设咨询事业部（宏建公司）</p>
    </header>

    <div class="card upload-section">
      <div class="section-title">上传检查照片</div>
      <div class="upload-area">
        <div class="upload-box" id="uploadBox" onclick="chooseImage()">
          <img id="previewImage" class="preview-image" alt="预览">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <div class="upload-icon-wrapper">
              <svg viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
              </svg>
            </div>
            <p>点击上传现场检查照片（可多选）</p>
            <div class="upload-hint">支持 JPG、PNG 格式，可一次选择多张</div>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)">
      </div>
      <div id="previewArea" class="preview-area"></div>
      <div class="upload-tips">
        <span class="upload-tip">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          智能识别
        </span>
        <span class="upload-tip">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          安全加密
        </span>
        <span class="upload-tip">
          <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
          快速上传
        </span>
      </div>
    </div>

    <div class="card">
      <div class="btn-group">
        <button id="analyzeBtn" class="analysis-btn" onclick="analyzeImage()" disabled>
          <svg viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3-6c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/>
          </svg>
          AI智能检查
        </button>
      </div>
      <div id="errorMsg" class="error-msg"></div>
    </div>

    <div id="loadingSection" class="loading-section">
      <div class="card">
        <div class="loading-spinner"></div>
        <div class="loading-text">AI 智能检查中...</div>
        <div class="loading-subtext">正在识别现场情况，请稍候</div>
      </div>
    </div>

    <div id="reportSection" class="report-section">
      <div class="report-card">
        <div class="report-header">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
          <h2>AI 智能检查报告</h2>
          <button class="export-btn" onclick="copyReport()">
            <svg viewBox="0 0 24 24">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            复制报告
          </button>
        </div>
        <div class="report-body">
          <div id="reportContent" class="report-content"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apiKey = "sk-5ff678aa656a4620ba66cb2ca3f642ab";
    const apiUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";

    let imageUrls = [];
    let uploadedFiles = [];

    function chooseImage() {
      document.getElementById('fileInput').click();
    }

    function handleFileSelect(event) {
      const files = event.target.files;
      if (files.length > 0) {
        const previewArea = document.getElementById('previewArea');
        const uploadBox = document.getElementById('uploadBox');
        
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const reader = new FileReader();
          
          reader.onload = function(e) {
            const imgData = e.target.result;
            imageUrls.push(imgData);
            uploadedFiles.push(file);
            
            const idx = imageUrls.length;
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
              <img src="${imgData}" alt="照片${idx}">
              <span class="photo-num">问题${idx}</span>
              <button class="remove-btn" onclick="removeImage(${idx-1}, this)">×</button>
            `;
            previewArea.appendChild(div);
            
            uploadBox.classList.add('has-image');
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = false;
          };
          
          reader.onerror = function() {
            showError("图片选择失败");
          };
          
          reader.readAsDataURL(file);
        }
      }
      event.target.value = '';
    }

    function removeImage(index, btn) {
      imageUrls.splice(index, 1);
      uploadedFiles.splice(index, 1);
      btn.parentElement.remove();
      
      const previewItems = document.querySelectorAll('.preview-item');
      previewItems.forEach((item, idx) => {
        item.querySelector('.photo-num').textContent = `问题${idx + 1}`;
        item.querySelector('.remove-btn').setAttribute('onclick', `removeImage(${idx}, this)`);
      });
      
      if (imageUrls.length === 0) {
        document.getElementById('uploadBox').classList.remove('has-image');
        document.getElementById('analyzeBtn').disabled = true;
      }
    }

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function analyzeImage() {
      if (imageUrls.length === 0) {
        showError("请先上传图片");
        return;
      }

      const analyzeBtn = document.getElementById('analyzeBtn');
      const loadingSection = document.getElementById('loadingSection');
      const reportSection = document.getElementById('reportSection');

      analyzeBtn.disabled = true;
      analyzeBtn.classList.add('loading-btn');
      analyzeBtn.innerHTML = '<span class="loading-spinner" style="width:20px;height:20px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white;"></span> 检查中...';
      loadingSection.style.display = 'block';
      reportSection.style.display = 'none';
      hideError();

      try {
        const prompt = `你是一名资深工程检查专家，请根据现场图片严格按以下要求生成检查报告。注意：共有${imageUrls.length}张照片，每张照片对应一个问题，请按序号分别分析。

格式要求：
【问题1】照片1的问题分析
  1. 问题描述：指出具体安全隐患 
  2. 违规条款：引用安全规范全称+条款号+带引号的条款原文 
  3. 整改措施：说明具体整改措施 

【问题2】照片2的问题分析
  ...

依此类推，每张照片单独分析问题`;

        const requestData = {
          model: "qwen-vl-max",
          messages: [
            {
              role: "user",
              content: [
                { type: "text", text: prompt },
                ...imageUrls.map((img, idx) => ({
                  type: "image_url",
                  image_url: {
                    url: img
                  }
                }))
              ]
            }
          ]
        };

        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestData)
        });

        if (response.ok) {
          const data = await response.json();
          document.getElementById('reportContent').textContent = data.choices[0].message.content;
          reportSection.style.display = 'block';
          reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          showError("检查失败，请重试");
        }
      } catch (error) {
        console.error(error);
        showError("检查失败，请重试");
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.classList.remove('loading-btn');
        analyzeBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm3-6c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg> AI智能检查';
        loadingSection.style.display = 'none';
      }
    }

    function copyReport() {
      const reportContent = document.getElementById('reportContent').innerText;
      
      if (!reportContent) {
        showError("请先完成检查并生成报告");
        return;
      }
      
      navigator.clipboard.writeText(reportContent).then(() => {
        const btn = document.querySelector('.export-btn');
        btn.textContent = '已复制!';
        setTimeout(() => {
          btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 复制报告';
        }, 2000);
      });
    }
  </script>
</body>
</html>
